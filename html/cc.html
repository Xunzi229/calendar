<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background-color: #f0f2f5;
    }

    .holiday-tag {
      font-size: 10px;
      line-height: 1;
      padding: 1px 2px;
      border-radius: 2px;
      position: absolute;
      top: 2px;
      right: 2px;
    }

    .tag-xiu {
      background-color: #f5222d;
      color: white;
    }

    .tag-ban {
      background-color: #595959;
      color: white;
    }

    .calendar-card {
      width: 780px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>

<body class="flex justify-center items-start pt-10">

  <div class="calendar-card bg-white rounded-2xl overflow-hidden border border-gray-100">
    <div class="px-6 py-4 flex justify-between items-center border-b border-gray-50">
      <div class="flex items-center space-x-2">
        <select class="border rounded-md px-2 py-1 text-sm text-gray-600 outline-none">
          <option>假期</option>
        </select>
      </div>
      <div class="flex items-center space-x-4">
        <div class="flex items-center border rounded-md px-2 py-1 space-x-3 text-sm font-medium">
          <span>2026年</span>
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
        <div class="flex items-center space-x-4">
          <span class="text-gray-400 cursor-pointer">&lt;</span>
          <div class="flex items-center space-x-2 border rounded-md px-4 py-1 text-sm font-medium">
            <span>4月</span>
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
          <span class="text-gray-400 cursor-pointer">&gt;</span>
        </div>
      </div>
      <button class="border rounded-md px-4 py-1 text-sm font-medium text-gray-700">今天</button>
    </div>

    <div class="p-4">
      <div class="grid grid-cols-7 mb-2">
        <div class="text-center text-sm text-gray-400 py-2">一</div>
        <div class="text-center text-sm text-gray-400 py-2">二</div>
        <div class="text-center text-sm text-gray-400 py-2">三</div>
        <div class="text-center text-sm text-gray-400 py-2">四</div>
        <div class="text-center text-sm text-gray-400 py-2">五</div>
        <div class="text-center text-sm text-red-400 py-2">六</div>
        <div class="text-center text-sm text-red-400 py-2">日</div>
      </div>

      <div class="grid grid-cols-7 gap-y-1">
        <div class="relative h-20 flex flex-col items-center justify-center text-gray-300">
          <span class="text-2xl font-light">30</span>
          <span class="text-xs">十二</span>
        </div>
        <div class="relative h-20 flex flex-col items-center justify-center text-gray-300">
          <span class="text-2xl font-light">31</span>
          <span class="text-xs">十三</span>
        </div>

        <div class="relative h-20 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 rounded-lg">
          <span class="text-2xl font-light">1</span>
          <span class="text-xs text-gray-500">愚人节</span>
        </div>
        <div class="relative h-20 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 rounded-lg">
          <span class="text-2xl font-light">2</span>
          <span class="text-xs text-gray-400">十五</span>
        </div>
        <div class="relative h-20 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 rounded-lg">
          <span class="text-2xl font-light">3</span>
          <span class="text-xs text-gray-400">十六</span>
        </div>
        <div class="relative h-20 flex flex-col items-center justify-center bg-red-50 rounded-lg">
          <span class="holiday-tag tag-xiu">休</span>
          <span class="text-2xl font-light text-red-500">4</span>
          <span class="text-xs text-red-500">寒食节</span>
        </div>
        <div class="relative h-20 flex flex-col items-center justify-center bg-red-50 rounded-lg">
          <span class="holiday-tag tag-xiu">休</span>
          <span class="text-2xl font-light text-red-500">5</span>
          <span class="text-xs text-red-500">清明</span>
        </div>
        <div class="relative h-20 flex flex-col items-center justify-center bg-red-50 rounded-lg">
          <span class="holiday-tag tag-xiu">休</span>
          <span class="text-2xl font-light text-red-500">6</span>
          <span class="text-xs text-red-500">十九</span>
        </div>

        <div class="relative h-20 flex flex-col items-center justify-center"><span
            class="text-2xl font-light">7</span><span class="text-xs text-gray-400">二十</span></div>
        <div class="relative h-20 flex flex-col items-center justify-center"><span
            class="text-2xl font-light">8</span><span class="text-xs text-gray-400">廿一</span></div>
        <div class="relative h-20 flex flex-col items-center justify-center"><span
            class="text-2xl font-light">9</span><span class="text-xs text-gray-400">廿二</span></div>
        <div class="relative h-20 flex flex-col items-center justify-center"><span
            class="text-2xl font-light">10</span><span class="text-xs text-gray-400">廿三</span></div>
        <div class="relative h-20 flex flex-col items-center justify-center"><span
            class="text-2xl font-light text-red-400">11</span><span class="text-xs text-gray-400">廿四</span></div>
        <div class="relative h-20 flex flex-col items-center justify-center"><span
            class="text-2xl font-light text-red-400">12</span><span class="text-xs text-gray-400">廿五</span></div>

        <div
          class="relative h-20 flex flex-col items-center justify-center col-start-3 row-start-4 border-2 border-blue-500 rounded-xl bg-white z-10">
          <span class="absolute -top-1 right-1 text-[10px] bg-blue-500 text-white rounded px-1">今</span>
          <span class="text-2xl font-medium text-blue-600">22</span>
          <span class="text-xs text-blue-600">地球日</span>
        </div>

        <div
          class="relative h-20 flex flex-col items-center justify-center col-start-5 row-start-5 bg-red-50 rounded-lg">
          <span class="holiday-tag tag-xiu">休</span>
          <span class="text-2xl font-light text-red-500">1</span>
          <span class="text-xs text-red-500">劳动节</span>
        </div>
        <div class="relative h-20 flex flex-col items-center justify-center col-start-6 row-start-6">
          <span class="holiday-tag tag-ban">班</span>
          <span class="text-2xl font-light text-gray-400">9</span>
          <span class="text-xs text-gray-400">廿三</span>
        </div>
      </div>
    </div>

    <div class="bg-gray-50/80 p-4 m-4 rounded-xl text-sm border border-gray-100">
      <div class="flex items-center space-x-2 text-blue-500 mb-3 bg-blue-50 w-fit px-2 py-0.5 rounded text-xs">
        <span>节日百科</span>
        <span class="text-gray-400">|</span>
        <span>地球日</span>
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>

      <div class="flex items-start justify-between">
        <div class="space-y-1">
          <div class="text-lg font-medium text-gray-800">三月初六</div>
          <div class="text-sm text-gray-600 font-medium">丙午年 马</div>
        </div>

        <div class="flex-1 px-8 space-y-2">
          <div class="flex items-center space-x-3">
            <span
              class="w-5 h-5 flex items-center justify-center bg-red-500 text-white rounded-full text-[10px]">宜</span>
            <span class="text-gray-700 text-xs">结婚.出行.打扫.合婚订婚.签订合同.交易.买房.开业.订盟.动土...</span>
          </div>
          <div class="flex items-center space-x-3">
            <span
              class="w-5 h-5 flex items-center justify-center bg-gray-700 text-white rounded-full text-[10px]">忌</span>
            <span class="text-gray-700 text-xs">安葬.祭祀.作灶.入殓</span>
          </div>
        </div>

        <div class="flex items-center text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M9 5l7 7-7 7"></path>
          </svg>
        </div>
      </div>

      <div class="mt-4 pt-3 border-t border-gray-200/60 flex items-center text-xs text-gray-500">
        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        距离 2026年劳动节 还有 <span class="text-gray-800 font-bold mx-1">9</span> 天
      </div>
    </div>
  </div>

</body>

</html>
